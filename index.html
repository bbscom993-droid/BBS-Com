<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        try {
          var nativeFetch = window.fetch;
          var customFetch = nativeFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return customFetch; },
            set: function(v) { customFetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine window.fetch natively:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
